<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SSAM Admin — إعادة تعيين كلمة المرور</title>
<link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/css/base.css"/>
<link rel="stylesheet" href="assets/css/login.css"/>
<link rel="icon" type="image/png" href="assets/img/logo-200.png"/>
<link rel="apple-touch-icon" href="assets/img/apple-touch-icon.png"/>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#1A5C2E" media="(prefers-color-scheme: light)"/>
<meta name="theme-color" content="#0e3a1c" media="(prefers-color-scheme: dark)"/>
</head>
<body>

<!--
  Landing page for Supabase Auth password-recovery emails.

  When a superadmin clicks "Send password reset email" in the admin
  Users tab, the Edge Function calls Supabase's resetPasswordForEmail
  endpoint with this page's URL as `redirectTo`. The user clicks the
  link in their email, lands here, and Supabase has stamped a recovery
  access_token into the URL fragment:

    https://ssamau.com/reset-password.html#access_token=<jwt>&type=recovery&refresh_token=...

  The page reads the fragment, asks for a new password, and posts it to
  `PUT /auth/v1/user` with the recovery token as the Bearer header.
  That sets the user's real password. They're then sent to /login.html
  to sign in with the new password normally.
-->

<div class="login-card">
  <div class="lang-toggle" role="radiogroup" data-i18n-aria-label="lang.label" aria-label="اللغة">
    <button type="button" class="lang-btn" data-action="setLang" data-value="ar" data-i18n="lang.arabic">العربية</button>
    <button type="button" class="lang-btn" data-action="setLang" data-value="en" data-i18n="lang.english">English</button>
  </div>

  <div class="lc-header">
    <div class="lc-logo"><img src="logo.png" data-i18n-alt="brand.logo_alt" alt="شعار النادي"/></div>
    <div class="lc-title" data-i18n="brand.ssam_full_ar">نادي الطلبة السعوديين في ملبورن</div>
    <div class="lc-sub"   data-i18n="brand.ssam_full_en">Saudi Students Association in Melbourne</div>
  </div>

  <div class="lc-body">
    <p class="lc-welcome" data-i18n="rp.lead">يرجى تعيين كلمة المرور الجديدة</p>

    <div class="fg">
      <label data-i18n="rp.password_label">كلمة المرور الجديدة</label>
      <div class="fg-icon-wrap">
        <span class="fg-icon">🔒</span>
        <input type="password" id="pw1"
               data-i18n-placeholder="rp.password_placeholder"
               placeholder="8 أحرف على الأقل"
               autocomplete="new-password" minlength="8"/>
        <button class="pw-toggle" type="button" id="pw-eye1">👁️</button>
      </div>
    </div>

    <div class="fg">
      <label data-i18n="rp.confirm_label">تأكيد كلمة المرور</label>
      <div class="fg-icon-wrap">
        <span class="fg-icon">🔒</span>
        <input type="password" id="pw2"
               data-i18n-placeholder="rp.confirm_placeholder"
               placeholder="أعد إدخال كلمة المرور"
               autocomplete="new-password" minlength="8"/>
        <button class="pw-toggle" type="button" id="pw-eye2">👁️</button>
      </div>
    </div>

    <button class="login-btn" id="submit-btn" type="button">
      <span id="submit-btn-txt" data-i18n="rp.submit">تعيين كلمة المرور</span>
    </button>

    <div class="error-msg" id="error-msg">❌</div>
    <div class="error-msg" id="success-msg" style="background:#0f5132;color:#d1e7dd;border-color:#0f5132">✅</div>
  </div>

  <div class="lc-footer">
    <a href="login.html" class="lc-back" data-i18n="rp.back">← الرجوع إلى تسجيل الدخول</a>
    <div class="lc-footer-txt" data-i18n="rp.footer_hint">إعادة تعيين كلمة المرور — استخدم الرابط من البريد فقط</div>
    <div class="lc-version">v3.0 · 2026</div>
  </div>
</div>

<script type="module" src="assets/js/reset-password.js"></script>
<script type="module" src="assets/js/lib/sw-register.js"></script>
</body>
</html>
