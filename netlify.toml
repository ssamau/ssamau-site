[build]
  publish = "."
  command = "npm install"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  # esbuild's transitive-CJS resolver misses nested deps (xtend/mutable inside
  # pg's postgres-interval, lib/sign-stream inside jws, etc.). `included_files`
  # ships the project's entire node_modules into the function, so Node's
  # standard require() resolution works at runtime — no manual whack-a-mole
  # listing every transitive package. Trade-off: bigger function bundle.
  external_node_modules = [
    "pg",
    "@neondatabase/serverless",
    "@netlify/database",
    "jsonwebtoken",
    "bcryptjs",
  ]
  included_files = ["node_modules/**"]

# Per-function overrides. Default sync timeout is 10s; bumped to 26s (the
# Netlify max for non-background functions) because setup.bulkSeed does a lot
# in one go (wipe + 98 member inserts + 20 bcrypt hashes + committee FK wiring).
[functions."api"]
  timeout = 26

[dev]
  publish = "."
  framework = "#static"
  port = 8888

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200
