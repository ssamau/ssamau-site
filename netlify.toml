[build]
  publish = "."
  command = "npm install"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  # esbuild's transitive-CJS resolver misses nested deps (xtend/mutable inside
  # pg's postgres-interval, lib/sign-stream inside jws, etc.). `included_files`
  # ships the project's entire node_modules into the function, so Node's
  # standard require() resolution works at runtime — no manual whack-a-mole
  # listing every transitive package. Trade-off: bigger function bundle.
  external_node_modules = [
    "pg",
    "@neondatabase/serverless",
    "@netlify/database",
    "jsonwebtoken",
    "bcryptjs",
  ]
  included_files = ["node_modules/**"]

# Per-function overrides. Default sync timeout is 10s; bumped to 26s (the
# Netlify max for non-background functions) because setup.bulkSeed does a lot
# in one go (wipe + 98 member inserts + 20 bcrypt hashes + committee FK wiring).
[functions."api"]
  timeout = 26

[dev]
  publish = "."
  framework = "#static"
  port = 8888

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200

# Vanity short-url for cert verification. The cert card footer shows
# "ssamau.com/verify" as the verification URL — the president typed
# that bare URL and got a Netlify 404 on 2026-05-15. Map it (with and
# without trailing slash, with and without ?code=...) to the real
# verify page so the literal string on the cert always works.
[[redirects]]
  from = "/verify"
  to = "/verify-cert.html"
  status = 301

[[redirects]]
  from = "/verify/"
  to = "/verify-cert.html"
  status = 301

[[redirects]]
  from = "/verify/:code"
  to = "/verify-cert.html?code=:code"
  status = 301

# ─── Security headers ──────────────────────────────────────────────────────
# Applied to every response Netlify serves. Tightens the surface for XSS,
# clickjacking, MIME sniffing, and unwanted browser-feature access.
#
# CSP design notes (CSP3 — Chrome 75+, Safari 18+, Firefox 113+, fine for us):
#   • script-src 'self' + script-src-elem 'self' blocks any <script> we didn't
#     ship from this origin (or the gtag loader we explicitly allow). All four
#     HTML pages have zero inline <script> blocks after the split branch —
#     verified — so we don't need 'unsafe-inline' on script-src.
#   • script-src-attr 'self' (was 'unsafe-inline' until commit 6 of the
#     spa-and-pwa branch). The previous setting was a deliberate temporary
#     loophole for the ~150 inline onclick="..." attributes the admin markup
#     used to carry — converting each one to addEventListener would have meant
#     touching every render template, which is exactly what commit 5 of this
#     branch did (replaced them all with data-action delegation via a single
#     document-level dispatcher in assets/js/admin/dispatch.js). Once the
#     inline handlers were gone, the CSP exception became dead weight that
#     would have re-opened the stored-XSS vector on the next markup
#     regression — so this commit closes it. `'self'` here is functionally
#     equivalent to 'none' for inline handlers (inline attributes can never
#     be same-origin); the keyword is just the minimum strict form that
#     parses correctly across browsers.
#   • style-src 'self' + Google Fonts CSS host. style-src-attr 'unsafe-inline'
#     same rationale — ~285 inline style="..." attributes throughout.
#   • connect-src includes google-analytics.com so gtag's beacon endpoint
#     isn't blocked, and the Supabase project domain since the API is now
#     a Supabase Edge Function (different origin from the static site).
#     `*.supabase.co` would be safer but our single project's hostname is
#     fine and tighter. Also includes fonts.googleapis.com +
#     fonts.gstatic.com — the service worker (sw.js) tries to fetch +
#     cache those for offline rendering, and `fetch()` calls are gated
#     by connect-src even when the matching resource is already allowed
#     by style-src / font-src. Without this, the SW logs "Refused to
#     connect" errors on every page load and the Almarai font falls
#     back to a system serif. See the May-15 fix/homepage-dark-mode
#     branch for the visible-CSS regression that surfaced this.
#   • frame-ancestors 'none' blocks the site from being framed (clickjacking).
#
# Other headers:
#   X-Content-Type-Options nosniff — stops the browser from guessing types.
#   Referrer-Policy strict-origin-when-cross-origin — minimal leak of paths
#     to third-party servers.
#   Permissions-Policy — explicitly deny powerful APIs we don't use.

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = """default-src 'self'; \
script-src 'self' https://www.googletagmanager.com; \
script-src-elem 'self' https://www.googletagmanager.com; \
script-src-attr 'self'; \
style-src 'self' https://fonts.googleapis.com; \
style-src-attr 'unsafe-inline'; \
font-src 'self' https://fonts.gstatic.com; \
img-src 'self' data: https:; \
connect-src 'self' https://www.google-analytics.com https://pfibxvwiulwiiuwerawe.supabase.co https://fonts.googleapis.com https://fonts.gstatic.com; \
frame-src 'self' https://app.netlify.com; \
frame-ancestors 'self' https://app.netlify.com https://*.netlify.app; \
base-uri 'self'; \
form-action 'self'; \
object-src 'none'"""
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "geolocation=(), microphone=(), camera=(), payment=(), usb=()"
    # X-Frame-Options is the legacy companion of frame-ancestors. Leaving it
    # unset because we explicitly need Netlify's app.netlify.com to be able to
    # frame deploy previews — `frame-ancestors` above gives us the modern,
    # per-origin allowlist that XFO can't express.
