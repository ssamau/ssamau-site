<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>التحقق من الشهادة — SSAM</title>
<link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/css/base.css"/>
<link rel="stylesheet" href="assets/css/login.css"/>
<link rel="stylesheet" href="assets/css/cert.css"/>
<link rel="icon" type="image/png" href="assets/img/logo-200.png"/>
<link rel="apple-touch-icon" href="assets/img/apple-touch-icon.png"/>
<meta name="theme-color" content="#1A5C2E" media="(prefers-color-scheme: light)"/>
<meta name="theme-color" content="#0e3a1c" media="(prefers-color-scheme: dark)"/>
</head>
<body>

<!--
  Public certificate-verification page.

  Every SSAM-issued certificate carries a unique cert_code (CRT_XXXXXXXX).
  The cert-delivery email links here with ?code=<cert_code> in the URL;
  the page calls the public `certs.verify` Edge Function action and
  renders the certificate details if the code matches a row.

  No auth needed — this page exists so external parties (employers,
  scholarship admins, universities) can verify an SSAM certificate
  someone hands them. The `certs.verify` action lives in PUBLIC_ACTIONS
  so it doesn't need a JWT.
-->

<div class="login-card">
  <div class="lc-header">
    <div class="lc-logo"><img src="assets/img/logo-200.png" alt="شعار النادي"/></div>
    <div class="lc-title">التحقق من شهادة</div>
    <div class="lc-sub">SSAM — Certificate Verification</div>
  </div>

  <div class="lc-body">
    <!-- Lead copy clarifies what the page does BEFORE the user types
         anything — Abu Juman's flag 2026-05-18: previously the form
         just sat there with no explanation, so first-time visitors
         (employers verifying a recipient's cert) didn't know what
         would happen after they pressed تحقق. -->
    <p style="font-size:.85rem;color:var(--tm,#6b7280);line-height:1.7;margin:0 0 1rem 0;text-align:center">
      أدخل رمز التحقق المطبوع على الشهادة (يبدأ بـ <code style="direction:ltr;font-family:monospace;background:rgba(184,147,42,.1);padding:.05rem .35rem;border-radius:4px">CRT_</code>) وستظهر لك الشهادة بكامل تفاصيلها.
    </p>
    <div class="fg">
      <label for="cert-code">رمز الشهادة</label>
      <input id="cert-code" type="text" placeholder="CRT_XXXXXXXX" dir="ltr" style="font-family:monospace;letter-spacing:.08em;text-align:center"/>
      <div class="fg-note">رمز التحقق المكوّن من 11 خانة الموجود في الشهادة</div>
    </div>

    <button class="login-btn" id="verify-btn" type="button">🔍 تحقق</button>

    <div id="result" style="margin-top:1.3rem;display:none"></div>
  </div>

  <div class="lc-footer">
    <a href="index.html" class="lc-back">← العودة إلى الصفحة الرئيسية</a>
    <div class="lc-footer-txt">شهادات النادي قابلة للتحقق عبر هذه الصفحة</div>
  </div>
</div>

<script type="module" src="assets/js/verify-cert.js"></script>
</body>
</html>
