# Supabase project configuration for SSAM Website.
#
# Generated by hand to scaffold the migration off the Netlify+Neon stack.
# Once `supabase link` runs against the real project, the CLI may add a few
# fields here automatically — that's fine, this file is shared in git so
# any addition gets reviewed in the diff.
#
# Run `supabase start` for a local Supabase stack (Postgres + Auth +
# Storage + Edge Functions runtime) mirroring prod. Apply the migrations
# with `supabase db reset` (wipes + re-applies all migrations cleanly).

project_id = "ssamau"

[api]
enabled = true
# Default Supabase API port. Picked because it doesn't conflict with the
# Netlify dev server (8888).
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
# Match the linked project's Postgres version. Supabase provisions PG17 on
# new projects (May 2026 onwards); old PG15 default in the CLI template
# caused the link warning we hit on first run.
major_version = 17

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
# Local email-trap for testing magic-link / OTP / password-reset emails
# before SMTP is wired to Workspace. Visit http://localhost:54324 to read
# the captured emails.
enabled = true
port = 54324

[storage]
enabled = true
# 50 MiB ceiling per file. CV uploads (PDF/DOCX) come in well under this;
# bumped from the 5 MiB default so future profile photos / event photos
# don't choke.
file_size_limit = "50MiB"

[auth]
enabled = true
# Magic-link reset is the primary mechanism per the migration plan. OTP is
# kept available for the eventual 2FA follow-up but isn't enabled by
# default for sign-in. Email confirmations are required so randoms can't
# claim someone else's address.
site_url = "https://ssamau.com"
additional_redirect_urls = [
  "https://ssamau.com/login.html",
  "https://*.netlify.app/login.html",   # deploy previews
  "http://localhost:8888/login.html",   # local netlify dev
]
jwt_expiry = 604800            # 7 days — matches the prior custom JWT TTL
enable_signup = false          # public can't self-create accounts; members
                               # are created admin-side then receive a
                               # magic-link to set their own password.
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = false
double_confirm_changes = true
enable_confirmations = true
# secure_password_change = true  # require fresh login to change password.

# Rate limit on outgoing auth emails (recovery, signup confirm, etc.) —
# one send per minute per address. Anything lower (the CLI default is 1s)
# turns the recovery endpoint into a spam vector — anyone can hammer
# /auth/v1/recover with a target email and force 60×/min mail to that
# inbox. 1m matches Supabase's pre-CLI dashboard default and is what
# was on prod before the first `config push`.
max_frequency = "1m0s"
otp_length    = 6
otp_expiry    = 3600

# Branded password-recovery email — Arabic-first RTL layout matching the
# rest of the SSAM admin UI. Source of truth is the HTML file under
# `email-templates/` (version-controlled); `supabase config push` uploads
# it to the dashboard. Only Reset Password is customised right now — the
# other Auth templates (Confirm signup, Magic Link, Email Change, Invite)
# keep the Supabase defaults until a flow lands that actually triggers
# them. See email-templates/README.md for the editing workflow.
[auth.email.template.recovery]
subject       = "إعادة تعيين كلمة المرور — SSAM"
# Path is resolved relative to the project root (where `supabase` CLI is
# invoked from), NOT relative to this config.toml file — counterintuitive
# but verified empirically on CLI 2.98.2.
content_path  = "./supabase/email-templates/password-recovery.html"

[auth.sms]
enable_signup = false
enable_confirmations = false

# Edge Functions live under supabase/functions/<name>/. The CLI expects a
# [functions.<name>] block per function, not a top-level default.
#
# verify_jwt = false because our `api` function does its own JWT
# verification (custom HS256 against the legacy public.users table for
# now, then Supabase Auth tokens after the auth-migration commit). If
# Supabase enforced its own JWT gate on top, callers without a
# Supabase-issued token would 401 before our handler ever runs — that
# blocks the existing admin login flow during the transition.
[functions.api]
verify_jwt = false
