# Supabase project configuration for SSAM Website.
#
# Generated by hand to scaffold the migration off the Netlify+Neon stack.
# Once `supabase link` runs against the real project, the CLI may add a few
# fields here automatically — that's fine, this file is shared in git so
# any addition gets reviewed in the diff.
#
# Run `supabase start` for a local Supabase stack (Postgres + Auth +
# Storage + Edge Functions runtime) mirroring prod. Apply the migrations
# with `supabase db reset` (wipes + re-applies all migrations cleanly).

project_id = "ssamau"

[api]
enabled = true
# Default Supabase API port. Picked because it doesn't conflict with the
# Netlify dev server (8888).
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
# Local email-trap for testing magic-link / OTP / password-reset emails
# before SMTP is wired to Workspace. Visit http://localhost:54324 to read
# the captured emails.
enabled = true
port = 54324

[storage]
enabled = true
# 50 MiB ceiling per file. CV uploads (PDF/DOCX) come in well under this;
# bumped from the 5 MiB default so future profile photos / event photos
# don't choke.
file_size_limit = "50MiB"

[auth]
enabled = true
# Magic-link reset is the primary mechanism per the migration plan. OTP is
# kept available for the eventual 2FA follow-up but isn't enabled by
# default for sign-in. Email confirmations are required so randoms can't
# claim someone else's address.
site_url = "https://ssamau.com"
additional_redirect_urls = [
  "https://ssamau.com/login.html",
  "https://*.netlify.app/login.html",   # deploy previews
  "http://localhost:8888/login.html",   # local netlify dev
]
jwt_expiry = 604800            # 7 days — matches the prior custom JWT TTL
enable_signup = false          # public can't self-create accounts; members
                               # are created admin-side then receive a
                               # magic-link to set their own password.
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = false
double_confirm_changes = true
enable_confirmations = true
# secure_password_change = true  # require fresh login to change password.

[auth.sms]
enable_signup = false
enable_confirmations = false

# Edge Functions deployed from supabase/functions/<name>/ go here.
# Configuration per-function (timeout, etc) is added once we start writing
# them — keeping this block minimal until then.
[functions]
# Every function gets its own subdirectory under supabase/functions/.
# Verify JWT by default; turn off explicitly for public-facing ones (the
# applications.submit endpoint, certs.verify, etc.).
verify_jwt = true
