<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SSAM Admin — تسجيل الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/css/base.css"/>
<link rel="stylesheet" href="assets/css/login.css"/>
</head>
<body>

<div class="login-card">
  <div class="lc-header">
    <div class="lc-logo"><img src="logo.png" alt="شعار النادي"/></div>
    <div class="lc-title">نادي الطلبة السعوديين في ملبورن</div>
    <div class="lc-sub">Saudi Students Association in Melbourne</div>
  </div>

  <div class="lc-body">
    <p class="lc-welcome">مرحباً — يرجى تسجيل الدخول للوصول إلى لوحة الإدارة</p>

    <div class="fg">
      <label>البريد الإلكتروني، الهوية الوطنية، أو اسم المستخدم</label>
      <div class="fg-icon-wrap">
        <span class="fg-icon">👤</span>
        <input type="text" id="identifier" placeholder="أدخل أحد المعرّفات" autocomplete="username" autocapitalize="off" inputmode="email"/>
      </div>
    </div>

    <div class="fg">
      <label>كلمة المرور</label>
      <div class="fg-icon-wrap">
        <span class="fg-icon">🔒</span>
        <input type="password" id="password" placeholder="أدخل كلمة المرور" autocomplete="current-password"/>
        <button class="pw-toggle" type="button" id="pw-eye">👁️</button>
      </div>
    </div>

    <button class="login-btn" id="login-btn" type="button">
      <span id="login-btn-txt">تسجيل الدخول</span>
    </button>

    <div class="error-msg" id="error-msg">❌ المعرّف أو كلمة المرور غير صحيحة</div>
  </div>

  <div class="lc-footer">
    <a href="index.html" class="lc-back" data-ar>← العودة إلى الصفحة الرئيسية</a>
    <a href="index.html" class="lc-back" data-en style="display:none">← Back to home</a>
    <div class="lc-footer-txt">لوحة إدارة النادي — للاستخدام الداخلي فقط</div>
    <div class="lc-version">v3.0 · 2026</div>
  </div>
</div>

<script type="module" src="assets/js/login.js"></script>
</body>
</html>
