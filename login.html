<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SSAM Admin — تسجيل الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:'Almarai',sans-serif;}
body{background:linear-gradient(135deg,#0e3a1c 0%,#1A5C2E 50%,#0e3a1c 100%);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem;}

/* Background pattern */
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 20% 30%,rgba(184,147,42,.08) 0%,transparent 50%),radial-gradient(circle at 80% 70%,rgba(184,147,42,.06) 0%,transparent 50%);pointer-events:none;}

.login-card{background:#fff;border-radius:20px;width:100%;max-width:420px;overflow:hidden;box-shadow:0 25px 60px rgba(0,0,0,.35);}

/* Header */
.lc-header{background:linear-gradient(135deg,#0e3a1c,#1A5C2E);padding:2.5rem 2rem;text-align:center;}
.lc-logo{width:110px;height:110px;border-radius:50%;background:#fff;border:3px solid rgba(184,147,42,.5);margin:0 auto 1rem;display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.2);}
.lc-logo img{width:90%;height:90%;object-fit:contain;}
.lc-title{font-size:1.1rem;font-weight:800;color:#fff;margin-bottom:.3rem;}
.lc-sub{font-size:.75rem;color:rgba(255,255,255,.5);}

/* Form */
.lc-body{padding:2rem;}
.lc-welcome{font-size:.82rem;color:#4b5563;text-align:center;margin-bottom:1.5rem;line-height:1.6;}
.fg{margin-bottom:1rem;}
.fg label{display:block;font-size:.75rem;font-weight:700;color:#374151;margin-bottom:.35rem;}
.fg-icon-wrap{position:relative;}
.fg-icon{position:absolute;right:.85rem;top:50%;transform:translateY(-50%);font-size:.95rem;pointer-events:none;}
.fg input{width:100%;border:1.5px solid #e5e7eb;border-radius:10px;padding:.65rem 2.4rem .65rem .85rem;font-size:.9rem;font-family:'Almarai',sans-serif;direction:rtl;outline:none;transition:all .2s;background:#f9fafb;}
.fg input:focus{border-color:#1A5C2E;background:#fff;box-shadow:0 0 0 3px rgba(26,92,46,.1);}
.pw-toggle{position:absolute;left:.85rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:.9rem;color:#9ca3af;padding:.15rem;}
.pw-toggle:hover{color:#1A5C2E;}

.login-btn{width:100%;background:linear-gradient(135deg,#1A5C2E,#2a7a42);color:#fff;border:none;border-radius:10px;padding:.8rem;font-size:.95rem;font-weight:800;font-family:'Almarai',sans-serif;cursor:pointer;transition:all .2s;margin-top:.5rem;display:flex;align-items:center;justify-content:center;gap:.5rem;}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(26,92,46,.35);}
.login-btn:active{transform:translateY(0);}
.login-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}

.error-msg{background:#fef2f2;border:1.5px solid rgba(220,38,38,.2);border-radius:8px;padding:.65rem .85rem;font-size:.8rem;color:#dc2626;text-align:center;margin-top:.85rem;display:none;}
.error-msg.show{display:block;}

/* Footer */
.lc-footer{padding:1rem 2rem 1.5rem;text-align:center;}
.lc-footer-txt{font-size:.68rem;color:#9ca3af;}
.lc-version{display:inline-block;background:#f3f4f6;color:#6b7280;font-size:.65rem;font-weight:700;padding:.18rem .5rem;border-radius:50px;margin-top:.3rem;}

/* Spinner */
.spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Shake animation */
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.shake{animation:shake .4s ease;}
</style>
</head>
<body>

<div class="login-card">
  <div class="lc-header">
    <div class="lc-logo"><img src="logo.png" alt="شعار النادي"/></div>
    <div class="lc-title">نادي الطلبة السعوديين في ملبورن</div>
    <div class="lc-sub">Saudi Students Association in Melbourne</div>
  </div>

  <div class="lc-body">
    <p class="lc-welcome">مرحباً — يرجى تسجيل الدخول للوصول إلى لوحة الإدارة</p>

    <div class="fg">
      <label>اسم المستخدم</label>
      <div class="fg-icon-wrap">
        <span class="fg-icon">👤</span>
        <input type="text" id="username" placeholder="أدخل اسم المستخدم" autocomplete="username" autocapitalize="off"/>
      </div>
    </div>

    <div class="fg">
      <label>كلمة المرور</label>
      <div class="fg-icon-wrap">
        <span class="fg-icon">🔒</span>
        <input type="password" id="password" placeholder="أدخل كلمة المرور" autocomplete="current-password"/>
        <button class="pw-toggle" onclick="togglePw()" type="button" id="pw-eye">👁️</button>
      </div>
    </div>

    <button class="login-btn" onclick="doLogin()" id="login-btn">
      <span id="login-btn-txt">تسجيل الدخول</span>
    </button>

    <div class="error-msg" id="error-msg">❌ اسم المستخدم أو كلمة المرور غير صحيحة</div>
  </div>

  <div class="lc-footer">
    <div class="lc-footer-txt">لوحة إدارة النادي — للاستخدام الداخلي فقط</div>
    <div class="lc-version">v3.0 · 2026</div>
  </div>
</div>

<script>
'use strict';

// ── API ───────────────────────────────────────────────────────
const API = '/.netlify/functions/api';

// ── LOGIN LOGIC ──────────────────────────────────────────────
async function doLogin() {
  const username = document.getElementById('username').value.trim().toLowerCase();
  const password = document.getElementById('password').value;

  if (!username || !password) {
    showError('يرجى إدخال اسم المستخدم وكلمة المرور');
    return;
  }

  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div>';

  try {
    const resp = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'auth', username, password }),
    });
    const json = await resp.json();
    const payload = json && json.data ? json.data : json;

    if (json && json.success && payload && payload.user && payload.token) {
      const session = {
        id:         payload.user.id,
        name:       payload.user.name,
        username:   payload.user.username,
        role:       payload.user.role,
        access:     payload.user.access,
        member_id:  payload.user.member_id,
        committee_id: payload.user.committee_id,
        token:      payload.token,
        loginAt:    new Date().toISOString(),
      };
      sessionStorage.setItem('ssam_session', JSON.stringify(session));
      sessionStorage.setItem('ssam_token', payload.token);
      localStorage.setItem('ssam_last_user', payload.user.username);
      window.location.href = 'admin.html';
    } else {
      btn.disabled = false;
      btn.innerHTML = '<span id="login-btn-txt">تسجيل الدخول</span>';
      showError('اسم المستخدم أو كلمة المرور غير صحيحة');
      document.querySelector('.login-card').classList.remove('shake');
      void document.querySelector('.login-card').offsetWidth;
      document.querySelector('.login-card').classList.add('shake');
    }
  } catch (e) {
    btn.disabled = false;
    btn.innerHTML = '<span id="login-btn-txt">تسجيل الدخول</span>';
    showError('تعذّر الاتصال بالخادم، حاول مجدداً');
  }
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = '❌ ' + msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 4000);
}

function togglePw() {
  const inp = document.getElementById('password');
  const eye = document.getElementById('pw-eye');
  if (inp.type === 'password') {
    inp.type = 'text';
    eye.textContent = '🙈';
  } else {
    inp.type = 'password';
    eye.textContent = '👁️';
  }
}

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// Pre-fill last username
const lastUser = localStorage.getItem('ssam_last_user');
if (lastUser) {
  const el = document.getElementById('username');
  if (el) el.value = lastUser;
}

// If already logged in → redirect
if (sessionStorage.getItem('ssam_session')) {
  window.location.href = 'admin.html';
}
</script>
</body>
</html>
